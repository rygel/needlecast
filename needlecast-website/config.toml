baseURL = "https://needlecast.dev/"
languageCode = "en-us"
title = "Needlecast"
theme = "needlecast"

[params]
  description = "A modern approach for an agentic coding environment"
  githubRepo = "https://github.com/rygel/needlecast"
  version = "0.6.17"
  
  # Features for home page
  features = [
    "Project Tree & Organization",
    "Auto-detected Commands",
    "Embedded Terminals",
    "Syntax Editor & File Explorer",
    "Image & SVG Viewer",
    "Log Viewer Panel",
    "Renovate Integration",
    "Prompt & Command Libraries"
  ]

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 2
  [[menu.main]]
    name = "Documentation"
    url = "/docs/"
    weight = 3
  [[menu.main]]
    name = "Download"
    url = "/downloads/"
    weight = 4

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]