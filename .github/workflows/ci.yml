name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      MAVEN_GITHUB_ACTOR: ${{ secrets.SPARKLE4J_ACTOR || github.actor }}
      MAVEN_GITHUB_TOKEN: ${{ secrets.SPARKLE4J_TOKEN || secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: MAVEN_GITHUB_ACTOR
          server-password: MAVEN_GITHUB_TOKEN

      - name: Build and test
        env:
          GITHUB_ACTOR: ${{ env.MAVEN_GITHUB_ACTOR }}
          GITHUB_TOKEN: ${{ env.MAVEN_GITHUB_TOKEN }}
        run: mvn -pl needlecast-desktop -am verify -T 4

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 14
