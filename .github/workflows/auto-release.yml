name: Release: Auto Tag

# When a push to main changes the version in pom.xml, automatically create
# a GitHub release with the corresponding tag. This triggers release.yml
# which builds installers and generates appcast.xml.

on:
  push:
    branches: [main]
    paths:
      - 'pom.xml'

permissions: {}

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect version change
        id: version
        run: |
          CURRENT=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          PREVIOUS=$(git show HEAD~1:pom.xml 2>/dev/null | grep -m1 '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/' || echo "")

          echo "current=$CURRENT"
          echo "previous=$PREVIOUS"

          if [[ "$CURRENT" != "$PREVIOUS" && -n "$CURRENT" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS -> $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT), skipping release"
          fi

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          VERSION="$RELEASE_VERSION"
          TAG="v$VERSION"

          # Check if tag already exists
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          echo "Creating release $TAG"
          gh release create "$TAG" \
            --target main \
            --title "Needlecast $VERSION" \
            --generate-notes
