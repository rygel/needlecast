name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-sparkle4j
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build fat JAR
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -pl needlecast-desktop -am package -DskipTests -T 4

      - name: Generate checksum
        run: |
          cd needlecast-desktop/target
          sha256sum needlecast.jar > needlecast.jar.sha256
          cat needlecast.jar.sha256

      - name: Upload JAR artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-jar
          path: |
            needlecast-desktop/target/needlecast.jar
            needlecast-desktop/target/needlecast.jar.sha256
          retention-days: 90

      - name: Attach JAR to GitHub release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            needlecast-desktop/target/needlecast.jar \
            needlecast-desktop/target/needlecast.jar.sha256

  package-native:
    runs-on: ${{ matrix.os }}
    needs: build-jar
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          # No Maven cache — Maven is not invoked here; jlink/jpackage use the downloaded JAR

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: needlecast-jar
          path: needlecast-desktop/target/

      - name: Build installer (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          APP_VERSION: ${{ github.ref_name != '' && github.ref_name || '0.0.0-dev' }}
        run: |
          # Strip leading 'v' from tag (v0.7.0 → 0.7.0)
          export APP_VERSION="${APP_VERSION#v}"
          bash scripts/build-jpackage.sh

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          APP_VERSION: ${{ github.ref_name != '' && github.ref_name || '0.0.0-dev' }}
        run: |
          $env:APP_VERSION = $env:APP_VERSION -replace '^v', ''
          & scripts/build-jpackage.ps1

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-windows-installer
          path: build/needlecast-*-windows.exe
          retention-days: 90

      - name: Upload installer artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-macos-installer
          path: build/Needlecast-*.dmg
          retention-days: 90

      - name: Upload installer artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-linux-installer
          path: build/needlecast_*_amd64.deb
          retention-days: 90

      - name: Attach installer to GitHub release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Upload whichever installer this platform produced
          find build/ \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \) \
            -maxdepth 1 -exec gh release upload "$RELEASE_TAG" {} \;

  update-appcast:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: package-native
    permissions:
      contents: write
    steps:
      - name: Generate and upload appcast.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          REPO="rygel/needlecast"
          BASE_URL="https://github.com/$REPO/releases/download/$RELEASE_TAG"
          PUB_DATE="$(date -R)"
          RELEASE_NOTES="https://github.com/$REPO/releases/tag/$RELEASE_TAG"

          # Query release assets for filenames and sizes
          ASSETS=$(gh api "repos/$REPO/releases/tags/$RELEASE_TAG" --jq '.assets[] | "\(.name) \(.size)"')
          WIN_FILE=$(echo "$ASSETS" | grep '\.exe$' | awk '{print $1}' || true)
          WIN_SIZE=$(echo "$ASSETS" | grep '\.exe$' | awk '{print $2}' || echo "0")
          MAC_FILE=$(echo "$ASSETS" | grep '\.dmg$' | awk '{print $1}' || true)
          MAC_SIZE=$(echo "$ASSETS" | grep '\.dmg$' | awk '{print $2}' || echo "0")
          DEB_FILE=$(echo "$ASSETS" | grep '\.deb$' | awk '{print $1}' || true)
          DEB_SIZE=$(echo "$ASSETS" | grep '\.deb$' | awk '{print $2}' || echo "0")

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0"
               xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle"
               xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Needlecast</title>
              <link>https://github.com/$REPO</link>
              <description>Needlecast update feed</description>
              <item>
                <title>Needlecast $VERSION</title>
                <pubDate>$PUB_DATE</pubDate>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:releaseNotesLink>$RELEASE_NOTES</sparkle:releaseNotesLink>
                <enclosure url="$BASE_URL/$WIN_FILE" sparkle:os="windows" length="$WIN_SIZE" type="application/octet-stream"/>
                <enclosure url="$BASE_URL/$MAC_FILE" sparkle:os="macos" length="$MAC_SIZE" type="application/octet-stream"/>
                <enclosure url="$BASE_URL/$DEB_FILE" sparkle:os="linux" length="$DEB_SIZE" type="application/vnd.debian.binary-package"/>
              </item>
            </channel>
          </rss>
          EOF
          sed -i 's/^          //' appcast.xml

          echo "Generated appcast.xml for $VERSION:"
          cat appcast.xml

          # Upload as a release asset (replaces if already exists)
          gh release upload "$RELEASE_TAG" appcast.xml --clobber
