name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat JAR
        run: mvn -pl desktop -am package -DskipTests -T 4

      - name: Generate checksum
        run: |
          cd desktop/target
          sha256sum needlecast.jar > needlecast.jar.sha256
          cat needlecast.jar.sha256

      - name: Upload JAR artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-jar
          path: |
            desktop/target/needlecast.jar
            desktop/target/needlecast.jar.sha256
          retention-days: 90

      - name: Attach JAR to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            desktop/target/needlecast.jar \
            desktop/target/needlecast.jar.sha256

  package-native:
    runs-on: ${{ matrix.os }}
    needs: build-jar
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          # No Maven cache — Maven is not invoked here; jlink/jpackage use the downloaded JAR

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: needlecast-jar
          path: desktop/target/

      - name: Build app image (Linux / macOS)
        if: runner.os != 'Windows'
        run: bash scripts/build-jpackage.sh

      - name: Build app image (Windows)
        if: runner.os == 'Windows'
        run: powershell -File scripts/build-jpackage.ps1

      - name: Archive app image (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/jpackage
          zip -r ../needlecast-linux-app-image.zip ./*

      - name: Archive app image (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/jpackage
          ditto -c -k --sequesterRsrc --keepParent Needlecast.app ../needlecast-macos-app-image.zip

      - name: Archive app image (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path build\\jpackage\\Needlecast -DestinationPath build\\needlecast-windows-app-image.zip -Force

      - name: Upload app image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-${{ matrix.os }}-app-image
          path: build/*-app-image.zip
          retention-days: 90

      - name: Attach app image to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" build/*-app-image.zip
