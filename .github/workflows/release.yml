name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat JAR
        run: mvn -pl desktop -am package -DskipTests -T 4

      - name: Generate checksum
        run: |
          cd desktop/target
          sha256sum needlecast.jar > needlecast.jar.sha256
          cat needlecast.jar.sha256

      - name: Upload JAR artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-jar
          path: |
            desktop/target/needlecast.jar
            desktop/target/needlecast.jar.sha256
          retention-days: 90

      - name: Attach JAR to GitHub release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            desktop/target/needlecast.jar \
            desktop/target/needlecast.jar.sha256

  package-native:
    runs-on: ${{ matrix.os }}
    needs: build-jar
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          # No Maven cache — Maven is not invoked here; jlink/jpackage use the downloaded JAR

      - name: Download fat JAR
        uses: actions/download-artifact@v4
        with:
          name: needlecast-jar
          path: desktop/target/

      - name: Build installer (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          APP_VERSION: ${{ github.ref_name != '' && github.ref_name || '0.0.0-dev' }}
        run: |
          # Strip leading 'v' from tag (v0.7.0 → 0.7.0)
          export APP_VERSION="${APP_VERSION#v}"
          bash scripts/build-jpackage.sh

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        env:
          APP_VERSION: ${{ github.ref_name != '' && github.ref_name || '0.0.0-dev' }}
        run: |
          $env:APP_VERSION = $env:APP_VERSION -replace '^v', ''
          powershell -File scripts/build-jpackage.ps1

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-windows-installer
          path: build/needlecast-*-windows.exe
          retention-days: 90

      - name: Upload installer artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-macos-installer
          path: build/Needlecast-*.dmg
          retention-days: 90

      - name: Upload installer artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-linux-installer
          path: build/needlecast_*_amd64.deb
          retention-days: 90

      - name: Attach installer to GitHub release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Upload whichever installer this platform produced
          find build/ \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \) \
            -maxdepth 1 -exec gh release upload "$RELEASE_TAG" {} \;
