name: Release: Build & Upload

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.6.17). Leave empty to use pom.xml'
        required: false
        type: string

permissions: {}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}
          persist-credentials: false

      - name: Resolve release tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            echo "Using published release tag: $TAG"
          else
            VERSION="${INPUT_VERSION}"
            if [[ -z "$VERSION" ]]; then
              VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
              echo "Version not provided. Using pom.xml: $VERSION"
            fi
            TAG="v$VERSION"
            if gh release view "$TAG" &>/dev/null; then
              echo "Release $TAG already exists"
            else
              echo "Creating release $TAG"
              gh release create "$TAG" \
                --target main \
                --title "Needlecast $VERSION" \
                --generate-notes
            fi
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

  build-jar:
    runs-on: ubuntu-latest
    needs: prepare-release
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github-rygel
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build fat JAR
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -pl needlecast-desktop -am package -DskipTests -T 4

      - name: Rename JAR with version and generate checksum
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          VERSION="${VERSION:-0.0.0-dev}"
          cd needlecast-desktop/target
          cp needlecast.jar "needlecast-${VERSION}.jar"
          sha256sum "needlecast-${VERSION}.jar" > "needlecast-${VERSION}.jar.sha256"
          cat "needlecast-${VERSION}.jar.sha256"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-jar
          path: |
            needlecast-desktop/target/needlecast*.jar
            needlecast-desktop/target/needlecast*.jar.sha256
          retention-days: 90

      - name: Attach JAR to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          gh release upload "$RELEASE_TAG" \
            "needlecast-desktop/target/needlecast-${VERSION}.jar" \
            "needlecast-desktop/target/needlecast-${VERSION}.jar.sha256"

  package-native:
    runs-on: ${{ matrix.os }}
    needs: [prepare-release, build-jar]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          # No Maven cache — Maven is not invoked here; jlink/jpackage use the downloaded JAR

      - name: Download fat JAR
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: needlecast-jar
          path: needlecast-desktop/target/

      - name: Build installer (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          APP_VERSION: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          # Strip leading 'v' from tag (v0.7.0 → 0.7.0)
          export APP_VERSION="${APP_VERSION#v}"
          bash scripts/build-jpackage.sh

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          APP_VERSION: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          $env:APP_VERSION = $env:APP_VERSION -replace '^v', ''
          & scripts/build-jpackage.ps1

      - name: Rename installers with version
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          VERSION="${APP_VERSION#v}"
          cd build
          # Windows: already named needlecast-VERSION-win64.exe by Inno Setup
          # macOS: jpackage uses 1.x.y — rename to real version
          for f in Needlecast-*.dmg; do
            [ -f "$f" ] && mv "$f" "needlecast-${VERSION}-macos.dmg"
          done
          # Linux: jpackage uses 1.x.y — rename to real version
          for f in needlecast_*_amd64.deb; do
            [ -f "$f" ] && mv "$f" "needlecast-${VERSION}-linux-amd64.deb"
          done
          ls -la needlecast-* 2>/dev/null || true

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-windows-installer
          path: |
            build/needlecast-*-win64.exe
            build/needlecast-*-windows-portable.zip
          retention-days: 90

      - name: Upload installer artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-macos-installer
          path: |
            build/needlecast-*-macos.dmg
            build/needlecast-*-macos-portable.zip
          retention-days: 90

      - name: Upload installer artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: needlecast-linux-installer
          path: |
            build/needlecast-*-linux-amd64.deb
            build/needlecast-*-linux-portable.tar.gz
          retention-days: 90

      - name: Attach installer to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          find build/ \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \
            -o -name "*-portable.zip" -o -name "*-portable.tar.gz" \) \
            -maxdepth 1 -exec gh release upload "$RELEASE_TAG" {} \;

  update-appcast:
    runs-on: ubuntu-latest
    needs: [prepare-release, package-native]
    permissions:
      contents: write
    steps:
      - name: Generate and upload appcast.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          REPO="rygel/needlecast"
          BASE_URL="https://github.com/$REPO/releases/download/$RELEASE_TAG"
          PUB_DATE="$(date -R)"
          RELEASE_NOTES="https://github.com/$REPO/releases/tag/$RELEASE_TAG"

          # Wait for all expected assets to appear (GitHub API propagation delay).
          # Query format: "filename size" per line — grep must NOT use $ anchor
          # because each line ends with the size, not the extension.
          echo "=== Waiting for release assets to be available ==="
          for ATTEMPT in $(seq 1 30); do
            ASSETS=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json assets --jq '.assets[] | "\(.name) \(.size)"')
            HAS_EXE=$(echo "$ASSETS" | grep -c '\.exe ' || true)
            HAS_DMG=$(echo "$ASSETS" | grep -c '\.dmg ' || true)
            HAS_DEB=$(echo "$ASSETS" | grep -c '\.deb ' || true)
            if [[ "$HAS_EXE" -ge 1 && "$HAS_DMG" -ge 1 && "$HAS_DEB" -ge 1 ]]; then
              echo "All native assets found (attempt $ATTEMPT)"
              break
            fi
            if [[ "$ATTEMPT" -eq 30 ]]; then
              echo "FATAL: native assets not found after 150 s (exe=$HAS_EXE dmg=$HAS_DMG deb=$HAS_DEB)"
              echo "Available assets:"
              echo "$ASSETS"
              exit 1
            fi
            echo "Waiting for assets... (attempt $ATTEMPT, exe=$HAS_EXE dmg=$HAS_DMG deb=$HAS_DEB)"
            sleep 5
          done

          WIN_FILE=$(echo "$ASSETS" | grep '\.exe ' | awk '{print $1}')
          WIN_SIZE=$(echo "$ASSETS" | grep '\.exe ' | awk '{print $2}')
          MAC_FILE=$(echo "$ASSETS" | grep '\.dmg ' | awk '{print $1}')
          MAC_SIZE=$(echo "$ASSETS" | grep '\.dmg ' | awk '{print $2}')
          DEB_FILE=$(echo "$ASSETS" | grep '\.deb ' | awk '{print $1}')
          DEB_SIZE=$(echo "$ASSETS" | grep '\.deb ' | awk '{print $2}')

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0"
               xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle"
               xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Needlecast</title>
              <link>https://github.com/$REPO</link>
              <description>Needlecast update feed</description>
              <item>
                <title>Needlecast $VERSION</title>
                <pubDate>$PUB_DATE</pubDate>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:releaseNotesLink>$RELEASE_NOTES</sparkle:releaseNotesLink>
                <enclosure url="$BASE_URL/$WIN_FILE" sparkle:os="windows" length="$WIN_SIZE" type="application/octet-stream"/>
                <enclosure url="$BASE_URL/$MAC_FILE" sparkle:os="macos" length="$MAC_SIZE" type="application/octet-stream"/>
                <enclosure url="$BASE_URL/$DEB_FILE" sparkle:os="linux" length="$DEB_SIZE" type="application/vnd.debian.binary-package"/>
              </item>
            </channel>
          </rss>
          EOF
          sed -i 's/^          //' appcast.xml

          echo "Generated appcast.xml for $VERSION:"
          cat appcast.xml

          # Upload as a release asset (replaces if already exists)
          gh release upload "$RELEASE_TAG" appcast.xml --clobber

  verify-update:
    runs-on: ubuntu-latest
    needs: [prepare-release, update-appcast]
    permissions:
      contents: read
    steps:
      - name: Verify appcast and download URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          REPO="rygel/needlecast"
          ERRORS=0

          echo "=== Downloading appcast.xml from release ==="
          gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "appcast.xml" --dir .
          cat appcast.xml

          echo ""
          echo "=== Validating XML structure ==="
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('appcast.xml')"
          echo "XML is well-formed"

          echo ""
          echo "=== Checking version in appcast ==="
          APPCAST_VERSION=$(grep -oP '<sparkle:version>\K[^<]+' appcast.xml)
          if [[ "$APPCAST_VERSION" != "$VERSION" ]]; then
            echo "FAIL: appcast version '$APPCAST_VERSION' does not match release '$VERSION'"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: version matches ($VERSION)"
          fi

          echo ""
          echo "=== Checking enclosure URLs are not empty ==="
          while IFS= read -r URL; do
            printf "  %s ... " "$URL"
            # Detect broken URLs that end with just /
            if [[ "$URL" =~ /$ ]]; then
              echo "FAIL (URL has no filename — asset was missing during appcast generation)"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
            if [[ "$STATUS" == "200" ]]; then
              echo "OK ($STATUS)"
            else
              echo "FAIL ($STATUS)"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(grep -oP 'url="\K[^"]+' appcast.xml)

          echo ""
          echo "=== Checking expected assets exist ==="
          ASSETS=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          for PATTERN in "needlecast-${VERSION}.jar" "needlecast-${VERSION}-win64.exe" "needlecast-${VERSION}-windows-portable.zip" "needlecast-${VERSION}-macos.dmg" "needlecast-${VERSION}-macos-portable.zip" "needlecast-${VERSION}-linux-amd64.deb" "needlecast-${VERSION}-linux-portable.tar.gz" "appcast.xml"; do
            if echo "$ASSETS" | grep -q "$PATTERN"; then
              echo "  OK: $PATTERN found"
            else
              echo "  FAIL: $PATTERN missing"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [[ $ERRORS -gt 0 ]]; then
            echo "FAILED: $ERRORS errors found"
            exit 1
          else
            echo "ALL CHECKS PASSED"
          fi
