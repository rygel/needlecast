<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Needlecast Web UI (Prototype)</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.5.0/css/xterm.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">Needlecast</div>
        <div class="sub">Web UI Prototype</div>
        <div class="section-title">Sessions</div>
        <ul class="list">
          <li class="list-item active">Default Shell</li>
        </ul>
        <div class="hint">Drag &amp; drop, docking, and more can be layered on top of this layout.</div>
      </aside>
      <main class="main">
        <div class="toolbar">
          <div class="title">Terminal</div>
          <div class="status" id="status">Connecting...</div>
        </div>
        <div id="terminal" class="terminal"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.5.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
